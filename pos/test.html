<!DOCTYPE html>
<html>
<head>
<style>
.catalog-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 12px;
}
.catalog-grid.list-view {
    display: flex;
    flex-direction: column;
}
.product-card {
    border: 1px solid #000;
    padding: 10px;
    display: flex;
    flex-direction: column;
}
.catalog-grid.list-view .product-card {
    flex-direction: row;
}
</style>
</head>
<body>
<div class="catalog-grid list-view" id="grid">
    <div class="product-card">Card 1</div>
    <div class="product-card">Card 2</div>
</div>
</body>
</html>
