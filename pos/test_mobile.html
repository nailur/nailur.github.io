<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; font-family: sans-serif; }
body { margin: 0; padding: 20px; }
.product-card {
    background: #fff;
    border: 1px solid #ccc;
    padding: 8px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    gap: 4px;
}
.product-image {
    width: 100%;
    aspect-ratio: 1;
    background: #eee;
}

@media (max-width: 768px) {
    .catalog-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        overflow: visible;
        gap: 12px;
    }
    .catalog-grid.list-view {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }
    .catalog-grid.list-view .product-card {
        flex-direction: row;
        align-items: center;
        height: auto;
        min-height: 56px;
        padding: 6px 8px;
    }
    .catalog-grid.list-view .product-image {
        width: 44px;
        height: 44px;
        margin: 0 8px 0 0;
    }
}
</style>
</head>
<body>
    <button onclick="document.getElementById('grid').classList.toggle('list-view')">Toggle</button>
    <hr>
    <div class="catalog-grid list-view" id="grid">
        <div class="product-card">
            <div class="product-image"></div>
            <div>
                <div>Product Name</div>
                <div>Rp 10.000</div>
            </div>
        </div>
        <div class="product-card">
            <div class="product-image"></div>
            <div>
                <div>Product Name 2</div>
                <div>Rp 15.000</div>
            </div>
        </div>
    </div>
</body>
</html>
