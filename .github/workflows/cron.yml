name: Daily Price Scheduler

on:
  schedule:
    # 09:30 WIB (02:30 UTC)
    - cron: '30 2 * * *'
    # 13:30 WIB (06:30 UTC)
    - cron: '30 6 * * *'
    # 18:00 WIB (11:00 UTC)
    - cron: '0 11 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  scrape-and-log:
    runs-on: ubuntu-latest
    steps:
      - name: Hit Cron API
        run: |
          curl -X POST "https://nailur.vercel.app/api/cron-log-price" -H "Content-Type: application/json"
